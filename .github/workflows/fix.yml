name: Fix Site
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: python3 -c "
          c=open('index.html').read();
          c=c.replace('.fi{opacity:0;transform:translateY(18px)','
          .fi{opacity:1;transform:translateY(0px)');
          open('index.html','w').write(c)"
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Fix blank sections
