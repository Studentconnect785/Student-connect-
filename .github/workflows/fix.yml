name: Fix Site
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Replace index.html
        run: |
          curl -L "https://gist.githubusercontent.com/Studentconnect785/0d3788bee8cc377023de84dcad6b4080/raw/ca68d5b4ad3031fe0d5d6f527c7c932bebe9a138/index.html" -o index.html
          echo "File size: $(wc -c < index.html)"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html
          git commit -m "Replace index.html with fixed version"
          git push
