name: Fix Site
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fix opacity and replace
        run: |
          curl -fsSL "https://gist.githubusercontent.com/Studentconnect785/d625713328d8a33b71d3f7dacc45730d/raw/1cf4cb67440ad80c33a5afce3b2bfa8de78cd93f/index.html" -o index.html
          sed -i 's/opacity:0;transform:translateY(18px)/opacity:1;transform:translateY(0px)/g' index.html
          echo "Fixed $(date)" >> vercel_trigger.txt
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Fix opacity and sections"
          git push
