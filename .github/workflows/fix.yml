name: Fix Site
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Replace index.html
        run: |
          curl -L "https://gist.githubusercontent.com/Studentconnect785/d625713328d8a33b71d3f7dacc45730d/raw/1cf4cb67440ad80c33a5afce3b2bfa8de78cd93f/index.html" -o index.html
          echo "Lines: $(wc -l < index.html)"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html
          git commit -m "Fix index.html" || echo "Nothing to commit"
          git push
