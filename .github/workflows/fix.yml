name: Fix Site
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fix opacity
        run: |
          sed -i 's/opacity:0/opacity:1/g' index.html
          sed -i 's/translateY(18px)/translateY(0px)/g' index.html
          git diff index.html
      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Fix blank sections
